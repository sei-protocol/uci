name: AI Review
run-name: UCI / AI Review
# Reusable three-pass PR review delivered as ONE GitHub PR review:
#   * preflight     -> assembles the prompts (base prompt + extra-instructions) and loads
#                      REVIEW.md from the PR's BASE branch, once, for the whole pipeline.
#   * codex_review  -> OpenAI Codex reviews the diff (own job, contents:read).
#   * cursor_review -> Cursor CLI reviews the diff (own job, contents:read). Runs parallel
#                      to Codex; both are third-party tools kept at least privilege so they
#                      never see the app token or any write scope.
#   * claude_review -> consumes BOTH, does its own review, MERGES all three, returns TYPED
#                      output, then a github-script step posts one PR review + a check run.
#
# Call it from a `pull_request` event (see .github/seidroid/README.md). It refuses to run
# under `pull_request_target`.
on:
  workflow_call:
    inputs:
      uci-ref:
        description: "Ref of sei-protocol/uci to fetch prompt files from. Pin to your `uses:` ref."
        required: false
        type: string
        default: 'main'
      enable-codex:
        description: "Run the OpenAI Codex scout pass."
        required: false
        type: boolean
        default: true
      enable-cursor:
        description: "Run the Cursor scout pass."
        required: false
        type: boolean
        default: true
      extra-instructions:
        description: "Extra guidance appended to the scout and review prompts."
        required: false
        type: string
        default: ''
      prebuild-script:
        description: "Inline shell run in the scout jobs after checkout, before the tool (e.g. warm offline deps)."
        required: false
        type: string
        default: ''
      guidelines-file:
        description: "Repo guidelines file loaded from the PR base branch."
        required: false
        type: string
        default: 'REVIEW.md'
      runs-on:
        description: "Runner label."
        required: false
        type: string
        default: 'ubuntu-latest'
      claude-model:
        description: "Optional Claude model override."
        required: false
        type: string
        default: ''
      approve-on-success:
        description: "If true, APPROVE on a clean verdict; otherwise COMMENT."
        required: false
        type: boolean
        default: true
      timeout-minutes:
        description: "Per-job timeout in minutes."
        required: false
        type: number
        default: 15

permissions: {}

concurrency:
  # Only ever review the latest push for a PR; cancel a superseded in-flight run.
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Preflight: assemble prompts + load base-branch guidelines, once.
  # ---------------------------------------------------------------------------
  preflight:
    name: Preflight
    runs-on: ${{ inputs.runs-on }}
    if: github.event.pull_request.draft == false
    permissions:
      contents: read
    outputs:
      scout_prompt: ${{ steps.assemble.outputs.scout_prompt }}
      review_prompt: ${{ steps.assemble.outputs.review_prompt }}
      guidelines: ${{ steps.guidelines.outputs.content }}
    steps:
      - name: Refuse pull_request_target
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "::error::ai-review must be called from a 'pull_request' event, not '$EVENT_NAME'. Refusing to run."
            exit 1
          fi

      - name: Detect app credentials
        id: creds
        env:
          APP_ID: ${{ secrets.PLATFORM_CODE_AGENT_APP_ID }}
        run: |
          if [ -n "$APP_ID" ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi

      - name: Generate GitHub App token (to read uci prompts)
        id: app-token
        if: steps.creds.outputs.present == 'true'
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.PLATFORM_CODE_AGENT_APP_ID }}
          private-key: ${{ secrets.PLATFORM_CODE_AGENT_APP_PK }}
          owner: ${{ github.repository_owner }}
          repositories: uci

      - name: Fetch seidroid prompt files
        uses: actions/checkout@v6
        with:
          repository: sei-protocol/uci
          ref: ${{ inputs.uci-ref }}
          path: .uci
          sparse-checkout: .github/seidroid
          sparse-checkout-cone-mode: false
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token || github.token }}

      - name: Assemble prompts
        id: assemble
        env:
          EXTRA: ${{ inputs.extra-instructions }}
        run: |
          assemble() {
            cat ".uci/.github/seidroid/$1"
            if [ -n "$EXTRA" ]; then
              printf '\n\n## Additional instructions from the caller\n\n%s\n' "$EXTRA"
            fi
          }
          {
            echo "scout_prompt<<__SCOUT_EOF__"
            assemble scout.md
            echo "__SCOUT_EOF__"
            echo "review_prompt<<__REVIEW_EOF__"
            assemble review.md
            echo "__REVIEW_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Load review guidelines from the base branch
        id: guidelines
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          FILE: ${{ inputs.guidelines-file }}
        run: |
          content=""
          if out="$(gh api "repos/${REPO}/contents/${FILE}?ref=${BASE_SHA}" -H "Accept: application/vnd.github.raw" 2>/dev/null)"; then
            content="$out"
            echo "Loaded ${FILE} from base ${BASE_SHA}."
          else
            echo "No ${FILE} on base; proceeding without repo-specific guidelines."
          fi
          {
            echo "content<<__GUIDELINES_EOF__"
            printf '%s\n' "$content"
            echo "__GUIDELINES_EOF__"
          } >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Scout pass 1: Codex (third-party, least privilege).
  # ---------------------------------------------------------------------------
  codex_review:
    name: Codex
    needs: preflight
    runs-on: ${{ inputs.runs-on }}
    if: ${{ inputs.enable-codex && github.event.pull_request.draft == false }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    outputs:
      message: ${{ steps.codex.outputs.final-message }}
    steps:
      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0
          persist-credentials: false

      - name: Write review context
        env:
          GUIDELINES: ${{ needs.preflight.outputs.guidelines }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          printf '%s\n' "$GUIDELINES" > REVIEW_GUIDELINES.md
          {
            echo "# Pull request context"
            echo
            echo "Repository: ${REPO}"
            echo "PR number: ${PR_NUMBER}"
            echo "Base SHA: ${BASE_SHA}"
            echo "Head SHA: ${HEAD_SHA}"
            echo
            echo "To see the changes under review, run:"
            echo "    git diff ${BASE_SHA}...${HEAD_SHA}"
            echo
            echo "## Title"
            printf '%s\n' "$PR_TITLE"
            echo
            echo "## Description"
            printf '%s\n' "$PR_BODY"
          } > pr-context.md

      - name: Prebuild (warm Codex's offline sandbox)
        if: inputs.prebuild-script != ''
        run: ${{ inputs.prebuild-script }}

      - name: Run Codex
        id: codex
        # A Codex failure must NOT block Claude's review.
        continue-on-error: true
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.PLATFORM_CODE_AGENT_OPENAI_API_KEY }}
          prompt: ${{ needs.preflight.outputs.scout_prompt }}

  # ---------------------------------------------------------------------------
  # Scout pass 2: Cursor (CLI agent, least privilege). Parallel with Codex.
  # ---------------------------------------------------------------------------
  cursor_review:
    name: Cursor
    needs: preflight
    runs-on: ${{ inputs.runs-on }}
    if: ${{ inputs.enable-cursor && github.event.pull_request.draft == false }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    outputs:
      message: ${{ steps.cursor.outputs.message }}
    steps:
      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0
          persist-credentials: false

      - name: Write review context
        env:
          GUIDELINES: ${{ needs.preflight.outputs.guidelines }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          printf '%s\n' "$GUIDELINES" > REVIEW_GUIDELINES.md
          {
            echo "# Pull request context"
            echo
            echo "Repository: ${REPO}"
            echo "PR number: ${PR_NUMBER}"
            echo "Base SHA: ${BASE_SHA}"
            echo "Head SHA: ${HEAD_SHA}"
            echo
            echo "To see the changes under review, run:"
            echo "    git diff ${BASE_SHA}...${HEAD_SHA}"
            echo
            echo "## Title"
            printf '%s\n' "$PR_TITLE"
            echo
            echo "## Description"
            printf '%s\n' "$PR_BODY"
          } > pr-context.md

      - name: Install Cursor CLI
        continue-on-error: true
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Run Cursor Agent
        id: cursor
        # A Cursor failure must NOT block Claude's review (mirrors Codex).
        continue-on-error: true
        env:
          CURSOR_API_KEY: ${{ secrets.PLATFORM_CODE_AGENT_CURSOR_API_KEY }}
          PROMPT: ${{ needs.preflight.outputs.scout_prompt }}
        run: |
          set +e
          if [ -z "$CURSOR_API_KEY" ]; then
            echo "::warning::CURSOR_API_KEY is empty -- skipping Cursor; Claude will note no Cursor output."
            { echo "message<<__EMPTY__"; echo ""; echo "__EMPTY__"; } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          agent -p --trust --output-format json -- "$PROMPT" \
            > "${RUNNER_TEMP}/cursor-out.json" 2> "${RUNNER_TEMP}/cursor-err.txt"
          echo "cursor-agent exit code: $?"
          tail -n 20 "${RUNNER_TEMP}/cursor-err.txt" 2>/dev/null || true
          MSG="$(jq -rs '.[-1] | (.result // .text // .message // .content // empty)' "${RUNNER_TEMP}/cursor-out.json" 2>/dev/null)"
          [ -n "$MSG" ] || MSG="$(cat "${RUNNER_TEMP}/cursor-out.json" 2>/dev/null)"
          DELIM="CURSOR_EOF_$$_${RANDOM}"
          {
            echo "message<<${DELIM}"
            printf '%s\n' "$MSG"
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Synthesis: Claude considers Codex + Cursor, then returns ONE typed review.
  # ---------------------------------------------------------------------------
  claude_review:
    name: Claude
    needs: [preflight, codex_review, cursor_review]
    runs-on: ${{ inputs.runs-on }}
    # `!cancelled()` so this still runs when a scout is skipped (toggled off) or fails;
    # `needs.preflight.result == 'success'` re-gates on the guard + prompt assembly.
    if: ${{ !cancelled() && needs.preflight.result == 'success' && github.event.pull_request.draft == false }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
      pull-requests: write   # create the PR review + inline comments, dismiss stale reviews
      checks: write          # create the "AI Review" check run
      id-token: write        # Anthropic workload identity federation
    steps:
      - name: Detect app credentials
        id: creds
        env:
          APP_ID: ${{ secrets.PLATFORM_CODE_AGENT_APP_ID }}
        run: |
          if [ -n "$APP_ID" ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi

      - name: Generate GitHub App token
        id: app-token
        if: steps.creds.outputs.present == 'true'
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.PLATFORM_CODE_AGENT_APP_ID }}
          private-key: ${{ secrets.PLATFORM_CODE_AGENT_APP_PK }}

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Write context files for Claude
        env:
          GUIDELINES: ${{ needs.preflight.outputs.guidelines }}
          CODEX_REVIEW: ${{ needs.codex_review.outputs.message }}
          CURSOR_REVIEW: ${{ needs.cursor_review.outputs.message }}
        run: |
          printf '%s\n' "$GUIDELINES" > REVIEW_GUIDELINES.md
          printf '%s\n' "$CODEX_REVIEW" > codex-review.md
          printf '%s\n' "$CURSOR_REVIEW" > cursor-review.md

      - name: Combined review (Claude considers Codex + Cursor)
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ steps.app-token.outputs.token || github.token }}
          anthropic_federation_rule_id: ${{ vars.PLATFORM_CODE_AGENT_ANTHROPIC_FDRL_ID }}
          anthropic_organization_id: ${{ vars.SEI_LABS_ANTHROPIC_ORG_ID }}
          anthropic_service_account_id: ${{ vars.PLATFORM_CODE_AGENT_ANTHROPIC_SVAC_ID }}
          bot_id: ${{ vars.PLATFORM_CODE_AGENT_USER_ID }}
          bot_name: 'seidroid[bot]'
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            ${{ needs.preflight.outputs.review_prompt }}
          claude_args: |
            --allowedTools "Read,Bash(gh pr diff:*),Bash(gh pr view:*)"
            ${{ inputs.claude-model != '' && format('--model {0}', inputs.claude-model) || '' }}
            --json-schema '{"type":"object","properties":{"verdict":{"type":"string","enum":["success","neutral","failure"],"description":"Overall combined verdict"},"summary":{"type":"string","description":"One- or two-sentence overall summary"},"blockers":{"type":"array","items":{"type":"string"},"description":"Blocking issues NOT tied to a specific line. Empty array if none."},"non_blockers":{"type":"array","items":{"type":"string"},"description":"Non-blocking suggestions or nits NOT tied to a specific line. Empty array if none."},"inline_comments":{"type":"array","description":"Findings tied to a specific changed line. Empty array if none.","items":{"type":"object","properties":{"path":{"type":"string","description":"Repo-relative file path exactly as in the diff"},"line":{"type":"integer","description":"Line number on the given side. NEW file line for RIGHT, OLD file line for LEFT. Must be a line present in the PR diff."},"side":{"type":"string","enum":["RIGHT","LEFT"],"description":"RIGHT = new/head version (default). LEFT = base/old version, for comments on removed lines."},"severity":{"type":"string","enum":["blocker","suggestion","nit"],"description":"Severity of this inline finding"},"body":{"type":"string","description":"The comment text"}},"required":["path","line","body"]}}},"required":["verdict","summary","blockers","non_blockers","inline_comments"]}'

      - name: Post the combined review and report verdict as a check run
        # Run on review success AND failure (to report the verdict), but NOT when the run
        # was cancelled by `concurrency` (a superseded push) -- the newer run posts instead.
        if: ${{ !cancelled() }}
        uses: actions/github-script@v8
        env:
          STRUCTURED_OUTPUT: ${{ steps.review.outputs.structured_output }}
          APPROVE_ON_SUCCESS: ${{ inputs.approve-on-success }}
        with:
          github-token: ${{ steps.app-token.outputs.token || github.token }}
          script: |
            const approveOnSuccess = String(process.env.APPROVE_ON_SUCCESS || "true") === "true";
            const pr = context.payload.pull_request;
            const number = pr?.number;
            const sha = pr?.head?.sha;

            // ---- 1) Parse the structured output -----------------------------
            let parsed = null;
            try { parsed = JSON.parse(process.env.STRUCTURED_OUTPUT || ""); }
            catch (e) { core.warning(`Could not parse structured_output: ${e.message}`); }
            const haveOutput = parsed && typeof parsed === "object";

            let verdict = String(parsed?.verdict ?? "").trim().toLowerCase();
            const VALID = ["success", "neutral", "failure"];
            if (!VALID.includes(verdict)) {
              core.warning(`No valid verdict (got "${verdict || "<empty>"}"); defaulting to failure.`);
              verdict = "failure";
            }
            const summary = String(parsed?.summary ?? "").trim();
            const blockers = Array.isArray(parsed?.blockers) ? parsed.blockers.map(s => String(s).trim()).filter(Boolean) : [];
            const nonBlockers = Array.isArray(parsed?.non_blockers) ? parsed.non_blockers.map(s => String(s).trim()).filter(Boolean) : [];
            const inline = Array.isArray(parsed?.inline_comments) ? parsed.inline_comments : [];
            const tag = (s) => {
              const v = String(s || "suggestion").toLowerCase();
              return v === "blocker" ? "**[blocker]** " : v === "nit" ? "**[nit]** " : "**[suggestion]** ";
            };

            // ---- 2) Build a commentable-line index from the actual PR diff ----
            const valid = { RIGHT: {}, LEFT: {} };
            if (number) {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner, repo: context.repo.repo,
                pull_number: number, per_page: 100,
              });
              for (const f of files) {
                if (!f.patch) continue; // binary / too large: cannot anchor here
                valid.RIGHT[f.filename] = new Set();
                valid.LEFT[f.filename] = new Set();
                let oldLn = 0, newLn = 0;
                for (const line of f.patch.split("\n")) {
                  const m = line.match(/^@@ -(\d+)(?:,\d+)? \+(\d+)(?:,\d+)? @@/);
                  if (m) { oldLn = parseInt(m[1], 10); newLn = parseInt(m[2], 10); continue; }
                  if (line.startsWith("+")) { valid.RIGHT[f.filename].add(newLn); newLn++; }
                  else if (line.startsWith("-")) { valid.LEFT[f.filename].add(oldLn); oldLn++; }
                  else if (line.startsWith(" ")) { valid.RIGHT[f.filename].add(newLn); valid.LEFT[f.filename].add(oldLn); oldLn++; newLn++; }
                }
              }
            }

            // ---- 3) Split inline findings into anchorable vs orphaned ---------
            const reviewComments = [];
            const orphaned = [];
            for (const c of inline) {
              const path = String(c?.path ?? "").trim();
              const lineNum = Number.isInteger(c?.line) ? c.line : parseInt(c?.line, 10);
              const side = String(c?.side ?? "RIGHT").toUpperCase() === "LEFT" ? "LEFT" : "RIGHT";
              const severity = String(c?.severity ?? "suggestion").toLowerCase();
              const body = String(c?.body ?? "").trim();
              if (!path || !body) continue;
              const anchorable = Number.isInteger(lineNum) && valid[side][path]?.has(lineNum);
              if (anchorable) reviewComments.push({ path, line: lineNum, side, severity, body });
              else orphaned.push({ path, line: Number.isInteger(lineNum) ? lineNum : null, severity, body });
            }
            const inlineBlockers = reviewComments.filter(c => c.severity === "blocker").length;
            const inlineOther = reviewComments.length - inlineBlockers;
            const orphanedBlockers = orphaned.filter(c => c.severity === "blocker").length;

            // Blocker-driven gate: pass iff there are zero blocker findings anywhere
            // (PR/file-level, anchored inline, or orphaned inline). Supersedes Claude's
            // reported `verdict` whenever we actually have parsed output.
            const totalBlockers = blockers.length + inlineBlockers + orphanedBlockers;
            if (haveOutput) verdict = totalBlockers > 0 ? "failure" : "success";

            // ---- 4) Assemble the review body ---------------------------------
            let body;
            if (!haveOutput) {
              body = "The automated review did not complete; see the failing **AI Review** check for details.";
            } else {
              const L = [];
              if (summary) L.push(summary);
              L.push("", `**Findings:** ${totalBlockers} blocking | ${nonBlockers.length + inlineOther} non-blocking | ${reviewComments.length} posted inline`);

              L.push("", "### Blockers");
              if (blockers.length) blockers.forEach(b => L.push(`- ${b}`));
              else L.push("- _None at the file/PR level._");
              if (inlineBlockers) L.push(`- _${inlineBlockers} blocking issue(s) flagged inline on specific lines._`);
              if (orphanedBlockers) L.push(`- _${orphanedBlockers} blocking issue(s) listed below under unanchored comments._`);

              L.push("", "### Non-blocking");
              if (nonBlockers.length) nonBlockers.forEach(n => L.push(`- ${n}`));
              else L.push("- _None at the file/PR level._");
              if (inlineOther) L.push(`- _${inlineOther} suggestion(s)/nit(s) flagged inline on specific lines._`);

              if (orphaned.length) {
                L.push("", "### Comments that couldn't be anchored to the diff");
                orphaned.forEach(o => L.push(`- \`${o.path}${o.line ? `:${o.line}` : ""}\` -- ${tag(o.severity)}${o.body}`));
              }
              body = L.join("\n");
            }

            // ---- 5) Marker + verdict -> review event -------------------------
            const MARKER = "<!-- ai-combined-review -->";
            body = `${MARKER}\n${body}`;
            let reviewEvent = "COMMENT";
            if (haveOutput && verdict === "failure") reviewEvent = "REQUEST_CHANGES";
            else if (haveOutput && verdict === "success" && approveOnSuccess) reviewEvent = "APPROVE";

            // ---- 6) Post the review, inline -> body-only -> COMMENT fallback --
            if (number && sha) {
              const mkComments = () => reviewComments.map(c => ({
                path: c.path, line: c.line, side: c.side, body: tag(c.severity) + c.body,
              }));
              const post = (event, withComments, bodyText) => github.rest.pulls.createReview({
                owner: context.repo.owner, repo: context.repo.repo, pull_number: number,
                commit_id: sha, event, body: bodyText,
                ...(withComments ? { comments: mkComments() } : {}),
              });
              try {
                await post(reviewEvent, true, body);
              } catch (e1) {
                core.warning(`createReview (inline, ${reviewEvent}) failed: ${e1.status} ${e1.message}. Retrying body-only.`);
                let bodyOnly = body;
                if (reviewComments.length) {
                  const dump = reviewComments.map(c => `- \`${c.path}:${c.line}\` (${c.side}) -- ${tag(c.severity)}${c.body}`);
                  bodyOnly += `\n\n### Inline comments (could not post inline; listed here)\n${dump.join("\n")}`;
                }
                try {
                  await post(reviewEvent, false, bodyOnly);
                } catch (e2) {
                  if (reviewEvent !== "COMMENT") {
                    core.warning(`createReview (body-only, ${reviewEvent}) failed: ${e2.status} ${e2.message}. Retrying as COMMENT.`);
                    await post("COMMENT", false, bodyOnly);
                  } else {
                    throw e2;
                  }
                }
              }
            }

            // ---- 7) No longer failing? Dismiss our prior REQUEST_CHANGES ------
            if (number && haveOutput && verdict !== "failure") {
              try {
                const reviews = await github.paginate(github.rest.pulls.listReviews, {
                  owner: context.repo.owner, repo: context.repo.repo, pull_number: number, per_page: 100,
                });
                for (const r of reviews) {
                  if (r.state === "CHANGES_REQUESTED" && (r.body || "").includes(MARKER)) {
                    await github.rest.pulls.dismissReview({
                      owner: context.repo.owner, repo: context.repo.repo,
                      pull_number: number, review_id: r.id,
                      message: "Superseded: latest AI review found no blocking issues.",
                    });
                  }
                }
              } catch (e) {
                core.warning(`Could not dismiss prior change-request reviews: ${e.message}`);
              }
            }

            // ---- 8) Report the verdict as a check run (the merge gate) -------
            if (!sha) { core.setFailed("No pull_request head SHA; cannot report status."); return; }
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: "AI Review",
              head_sha: sha,
              status: "completed",
              conclusion: verdict,
              output: {
                title: `Claude + Codex + Cursor Review: ${verdict}`,
                summary: summary || "No summary provided.",
              },
            });
